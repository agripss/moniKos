<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moniKos 💸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>moniKos<span>.</span></h1>
            <p>catet keuangan biar gak mode promag 🌟</p>
        </header>

        <section class="main-balance-card">
            <p class="balance-label">sisa uang belanja kamu</p>
            <h2 id="sisaUang">rp 0</h2>
            <button class="btn-reset-saldo" onclick="resetSaldoAwal()">🔄 reset saldo awal</button>
            
            <div class="setup-saldo" style="margin-top: 15px;">
                <input type="number" id="saldoAwal" placeholder="set saldo awal bulan...">
                <button onclick="setSaldo()">simpan</button>
            </div>
        </section>

        <section class="category-grid">
            <div class="cat-box belanja">
                <span>🛒</span>
                <p>belanja</p>
                <small id="stat-belanja">rp 0</small>
            </div>
            <div class="cat-box makan">
                <span>🍔</span>
                <p>makan</p>
                <small id="stat-makan">rp 0</small>
            </div>
            <div class="cat-box darurat">
                <span>🚨</span>
                <p>darurat</p>
                <small id="stat-darurat">rp 0</small>
            </div>
            <div class="cat-box reward">
                <span>🎀</span>
                <p>reward</p>
                <small id="stat-reward">rp 0</small>
            </div>
            <div class="cat-box tabungan">
                <span>🐷</span>
                <p>tabungan</p>
                <small id="stat-tabungan">rp 0</small>
            </div>
        </section>

        <button class="btn-summary-trigger" onclick="bukaRangkuman()">📊 lihat rangkuman bulan ini</button>

        <section class="card input-card">
            <h3>input pengeluaran baru ✨</h3>
            <div class="form-group">
                <input type="text" id="namaItem" placeholder="beli apa hari ini?" autocomplete="off">
            </div>
            <div class="form-row">
                <input type="number" id="nominalItem" placeholder="nominal (rp)...">
                <select id="kategoriItem">
                    <option value="belanja">🛒 belanja</option>
                    <option value="makan">🍔 makan & minum</option>
                    <option value="darurat">🚨 dana darurat</option>
                    <option value="reward">🎀 self reward</option>
                    <option value="tabungan">🐷 khusus tabungan</option>
                </select>
            </div>
            <button class="btn-primary" onclick="tambahCatatan()">tambah transaksi</button>
        </section>

        <section class="card history-card">
            <h3>riwayat kamu nihh 📜</h3>
            <ul id="listRiwayat" class="history-list">
                <li class="empty-state">belum ada pengeluaran hari ini. hemat pol!</li>
            </ul>
        </section>
    </div>

    <div id="modalRangkuman" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="judulRangkuman">rangkuman bulan ini 🌟</h3>
                <button class="close-modal" onclick="tutupRangkuman()">×</button>
            </div>
            <div id="isiRangkuman">
                </div>
        </div>
    </div>

    <script>
        // data utama keuangan
        let dompetkos = {
            saldoAwal: 0,
            pengeluaran: {
                belanja: 0,
                makan: 0,
                darurat: 0,
                reward: 0,
                tabungan: 0
            },
            riwayat: []
        };

        const classBulan = ['jan', 'feb', 'mar', 'apr', 'mei', 'jun', 'jul', 'agu', 'sep', 'okt', 'nov', 'des'];
        const namaBulanLengkap = ['januari', 'februari', 'maret', 'april', 'mei', 'juni', 'juli', 'agustus', 'september', 'oktober', 'november', 'desember'];

        // load data pas web dibuka
        window.onload = function() {
            const localData = localStorage.getItem('monikos_data');
            if (localData) {
                dompetkos = JSON.parse(localData);
            }
            updateTampilan();
        }

        // fungsi simpan saldo awal
        function setSaldo() {
            const inputSaldo = document.getElementById('saldoAwal').value;
            if (inputSaldo === '' || inputSaldo < 0) {
                alert('isi nominal saldo awal yang bener dulu yaaa cantiik/ganteng ✨');
                return;
            }
            dompetkos.saldoAwal = parseInt(inputSaldo);
            simpanKeLocalStorage();
            updateTampilan();
            document.getElementById('saldoAwal').value = '';
        }

        // reset total biar ga error minus
        function resetSaldoAwal() {
            const pilihan = confirm("pilih 'OK' untuk RESET TOTAL seluruh data keuangan biar balik ke rp 0.\n\npilih 'Cancel' jika hanya ingin mereset saldo awal saja.");
            if (pilihan) {
                dompetkos = {
                    saldoAwal: 0,
                    pengeluaran: { belanja: 0, makan: 0, darurat: 0, reward: 0, tabungan: 0 },
                    riwayat: []
                };
                alert("semua data keuangan kamu udah bersih kembali ke rp 0 yaaa! ✨");
            } else {
                dompetkos.saldoAwal = 0;
            }
            simpanKeLocalStorage();
            updateTampilan();
        }

        // tambah pengeluaran baru
        function tambahCatatan() {
            const namaItem = document.getElementById('namaItem').value;
            const nominalItem = document.getElementById('nominalItem').value;
            const kategoriItem = document.getElementById('kategoriItem').value;

            if (namaItem === '' || nominalItem === '' || nominalItem <= 0) {
                alert('aduh, isi nama barang ama nominalnya dulu yang bener yaaa! 📑');
                return;
            }

            const nominal = parseInt(nominalItem);
            const sekarang = new Date();

            dompetkos.pengeluaran[kategoriItem] += nominal;
            dompetkos.riwayat.unshift({
                id: Date.now(),
                nama: namaItem,
                nominal: nominal,
                kategori: kategoriItem,
                bulanIdx: sekarang.getMonth(),
                tahun: sekarang.getFullYear(),
                waktuDisplay: sekarang.toLocaleDateString('id-ID', { hour: '2-digit', minute: '2-digit' })
            });

            document.getElementById('namaItem').value = '';
            document.getElementById('nominalItem').value = '';

            simpanKeLocalStorage();
            updateTampilan();
        }

        // hapus satu riwayat transaksi
        function hapusTransaksi(idItem, nominal, kategori) {
            if (confirm('yakin mau hapus transaksi ini dari riwayat? 😢')) {
                dompetkos.pengeluaran[kategori] -= nominal;
                dompetkos.riwayat = dompetkos.riwayat.filter(item => item.id !== idItem);
                simpanKeLocalStorage();
                updateTampilan();
            }
        }

        // update tampilan ke layar monitor
        function updateTampilan() {
            let totalPengeluaran = 0;
            for (let kat in dompetkos.pengeluaran) {
                totalPengeluaran += dompetkos.pengeluaran[kat];
            }

            const sisa = dompetkos.saldoAwal - totalPengeluaran;
            document.getElementById('sisaUang').innerText = 'rp ' + sisa.toLocaleString('id-ID');

            document.getElementById('stat-belanja').innerText = 'rp ' + dompetkos.pengeluaran.belanja.toLocaleString('id-ID');
            document.getElementById('stat-makan').innerText = 'rp ' + dompetkos.pengeluaran.makan.toLocaleString('id-ID');
            document.getElementById('stat-darurat').innerText = 'rp ' + dompetkos.pengeluaran.darurat.toLocaleString('id-ID');
            document.getElementById('stat-reward').innerText = 'rp ' + dompetkos.pengeluaran.reward.toLocaleString('id-ID');
            document.getElementById('stat-tabungan').innerText = 'rp ' + dompetkos.pengeluaran.tabungan.toLocaleString('id-ID');

            const listRiwayat = document.getElementById('listRiwayat');
            if (dompetkos.riwayat.length === 0) {
                listRiwayat.innerHTML = '<li class="empty-state">belum ada pengeluaran hari ini. hemat pol!</li>';
            } else {
                listRiwayat.innerHTML = '';
                let bulanTerakhirDipasang = null;

                dompetkos.riwayat.forEach(item => {
                    if (item.bulanIdx !== bulanTerakhirDipasang) {
                        bulanTerakhirDipasang = item.bulanIdx;
                        const namaBulan = namaBulanLengkap[item.bulanIdx];
                        const classWarna = classBulan[item.bulanIdx];
                        listRiwayat.innerHTML += `
                            <div class="month-divider">
                                <span class="month-label m-${classWarna}">${namaBulan} ${item.tahun}</span>
                            </div>
                        `;
                    }

                    let emoji = '💸';
                    if(item.kategori === 'belanja') emoji = '🛒';
                    if(item.kategori === 'makan') emoji = '🍔';
                    if(item.kategori === 'darurat') emoji = '🚨';
                    if(item.kategori === 'reward') emoji = '🎀';
                    if(item.kategori === 'tabungan') emoji = '🐷';

                    listRiwayat.innerHTML += `
                        <li>
                            <div class="item-info">
                                <strong>${emoji} ${item.nama}</strong>
                                <small>${item.waktuDisplay}</small>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <span class="item-price">- rp ${item.nominal.toLocaleString('id-ID')}</span>
                                <button class="btn-delete" onclick="hapusTransaksi(${item.id}, ${item.nominal}, '${item.kategori}')">hapus</button>
                            </div>
                        </li>
                    `;
                });
            }
        }

        // fungsi buka rangkuman modal
        function bukaRangkuman() {
            const sekarang = new Date();
            const namaBulanIni = namaBulanLengkap[sekarang.getMonth()];
            
            let totalPengeluaran = 0;
            for (let kat in dompetkos.pengeluaran) {
                totalPengeluaran += dompetkos.pengeluaran[kat];
            }

            const sisa = dompetkos.saldoAwal - totalPengeluaran;
            let bgSaldoAkhir = '#d8f3dc'; 
            let teksMotivasi = '"yeay saldo mu sisa, bisa ditabung nih! mantap kerennn 🌟"';

            if (sisa < 0) {
                bgSaldoAkhir = '#ffd6e0'; 
                teksMotivasi = '"aduh gawat keuanganmu minus! kurangi self reward dan mode hemat dimulai! 🚨😭"';
            } else if (sisa === 0 && dompetkos.saldoAwal > 0) {
                bgSaldoAkhir = '#fefae0'; 
                teksMotivasi = '"dompet kamu pas-pasan banget, awas besok makan promag wkwk 🍟"';
            }

            let htmlKonten = `
                <div class="summary-line"><span>💰 total saldo awal</span><strong>rp ${dompetkos.saldoAwal.toLocaleString('id-ID')}</strong></div>
                <div style="margin: 15px 0 5px 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">rincian pengeluaran:</div>
                <div class="summary-line"><span>🛒 belanja</span><span>rp ${dompetkos.pengeluaran.belanja.toLocaleString('id-ID')}</span></div>
                <div class="summary-line"><span>🍔 makan & minum</span><span>rp ${dompetkos.pengeluaran.makan.toLocaleString('id-ID')}</span></div>
                <div class="summary-line"><span>🚨 dana darurat</span><span>rp ${dompetkos.pengeluaran.darurat.toLocaleString('id-ID')}</span></div>
                <div class="summary-line"><span>🎀 self reward</span><span>rp ${dompetkos.pengeluaran.reward.toLocaleString('id-ID')}</span></div>
                <div class="summary-line"><span>🐷 khusus tabungan</span><span>rp ${dompetkos.pengeluaran.tabungan.toLocaleString('id-ID')}</span></div>
                <div class="summary-line" style="margin-top: 10px; font-weight: 600;"><span>💸 total keluar</span><span style="color: #e63946;">rp ${totalPengeluaran.toLocaleString('id-ID')}</span></div>
                <div class="summary-total-box" style="background-color: ${bgSaldoAkhir}; margin-top:15px; padding:15px; border-radius:14px; font-weight:700;">
                    <span style="font-size: 0.85rem; display: block; font-weight: 500; color: #4a5568;">total saldo akhir</span>
                    <span style="font-size: 1.3rem;">rp ${sisa.toLocaleString('id-ID')}</span>
                </div>
                <p class="motivation-text" style="font-size: 0.85rem; color: #4a5568; margin-top: 10px; font-style: italic; text-align: center;">${teksMotivasi}</p>
            `;

            document.getElementById('judulRangkuman').innerText = `rangkuman ${namaBulanIni} ${sekarang.getFullYear()} 📊`;
            document.getElementById('isiRangkuman').innerHTML = htmlKonten;
            document.getElementById('modalRangkuman').classList.add('active');
        }

        function tutupRangkuman() {
            document.getElementById('modalRangkuman').classList.remove('active');
        }

        function simpanKeLocalStorage() {
            localStorage.setItem('monikos_data', JSON.stringify(dompetkos));
        }
    </script>
</body>
</html>
